name: Check ieee-conference-both-bibtex-2026-true
on:
  schedule:
    - cron: "0 6 * * 5"
  push:
    branches:
      - main
    paths-ignore:
      - '.editorconfig'
      - '.eslintignore'
      - '.gitpod.dockerfile'
      - '.gitpod.yml'
      - '.gitattributes'
      - '.gitignore'
      - '.markdownlint.yml'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'generate-texlivefile.sh'
      - 'LICENSE'
      - 'README.md'
      - 'setup-do.sh'
      - 'user-data.sh'
      - 'docs/**'
      - '.vscode/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '.editorconfig'
      - '.eslintignore'
      - '.gitpod.dockerfile'
      - '.gitpod.yml'
      - '.gitattributes'
      - '.gitignore'
      - '.markdownlint.yml'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'generate-texlivefile.sh'
      - 'LICENSE'
      - 'README.md'
      - 'setup-do.sh'
      - 'user-data.sh'
      - 'docs/**'
      - '.vscode/**'
  merge_group:
concurrency:
  group: ${{ github.workflow }}-${{ github.actor_id }}
  cancel-in-progress: true
jobs:
  check:
    name: Check ieee-conference-both-bibtex-2026-true
    runs-on: ubuntu-24.04
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm install -g yo
      - name: Summary table heading
        run: |
          TABLE='| documentclass | latexcompiler | bibtextool | texlive | lang | font    | listing  | enquote    | tweakouterquote | todo       | example | howtotext | link |'
          echo "TABLE=${TABLE}\n| -- | -- | -- | -- | -- | --| -- | -- | -- | -- | -- | -- | -- |" >> $GITHUB_ENV
      - run: mkdir var_edlcbpt
      - run: echo CURRENT_VARIANT='ieee_both_bibtex_2026_en_default_listings_csquotes_babel_pdfcomment_true_true' >> $GITHUB_ENV
      - run: echo CURRENT_VARIANT_SHORT='var_edlcbpt' >> $GITHUB_ENV
      - run: echo CURRENT_VARIANT_TABLE_ROW='| ieee          | both          | bibtex     | 2026    | en   | default | listings | csquotes   | babel           | pdfcomment | true    | true     |' >> $GITHUB_ENV
      - name: Create var_edlcbpt
        run: yo $GITHUB_WORKSPACE/generators/app/index.js --documentclass=ieee --ieeevariant=conference --papersize=a4 --latexcompiler=both --bibtextool=bibtex --texlive=2026 --docker=no --overleaf=no --lang=en --font=default --listings=listings --enquotes=csquotes --tweakouterquote=babel --todo=pdfcomment --examples=true --howtotext=true
        working-directory: '${{ github.workspace }}/var_edlcbpt'
      - name: Install TeX Live
        uses: zauguin/install-texlive@v4
        with:
          package_file: '${{ github.workspace }}/var_edlcbpt/Texlivefile'
          texlive_version: 2026
      - run: echo "TABLE=${TABLE}\n| ieee          | both          | bibtex     | 2026    | en   | default | listings | csquotes   | babel           | pdfcomment | true    | true     | [link](${{ steps.var_edlcbpt_u.outputs.artifact-url }}) |" >> $GITHUB_ENV
      - run: mkdir var_edlcbnt
      - run: echo CURRENT_VARIANT='ieee_both_bibtex_2026_en_default_listings_csquotes_babel_none_true_true' >> $GITHUB_ENV
      - run: echo CURRENT_VARIANT_SHORT='var_edlcbnt' >> $GITHUB_ENV
      - run: echo CURRENT_VARIANT_TABLE_ROW='| ieee          | both          | bibtex     | 2026    | en   | default | listings | csquotes   | babel           | none       | true    | true     |' >> $GITHUB_ENV
      - name: Create var_edlcbnt
        run: yo $GITHUB_WORKSPACE/generators/app/index.js --documentclass=ieee --ieeevariant=conference --papersize=a4 --latexcompiler=both --bibtextool=bibtex --texlive=2026 --docker=no --overleaf=no --lang=en --font=default --listings=listings --enquotes=csquotes --tweakouterquote=babel --todo=none --examples=true --howtotext=true
        working-directory: '${{ github.workspace }}/var_edlcbnt'
      - name: Install TeX Live
        uses: zauguin/install-texlive@v4
        with:
          package_file: '${{ github.workspace }}/var_edlcbnt/Texlivefile'
          texlive_version: 2026
      - run: echo "TABLE=${TABLE}\n| ieee          | both          | bibtex     | 2026    | en   | default | listings | csquotes   | babel           | none       | true    | true     | [link](${{ steps.var_edlcbnt_u.outputs.artifact-url }}) |" >> $GITHUB_ENV
